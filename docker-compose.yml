version: "3.8"

services:
  dailymood:
    build: .
    container_name: dailymood
    restart: unless-stopped
    ports:
      - "8501:8501"
    volumes:
      - ./entries:/app/entries
      - ./data:/app/data
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_SERVER_MAX_UPLOAD_SIZE=50
